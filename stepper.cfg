[stepper_x]
step_pin: micro:gpio6
dir_pin: !micro:gpio3
enable_pin: !micro:gpio7
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 170
position_min: 0
position_max: 170
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: micro:gpio9
uart_address: 0
run_current: 0.8
hold_current: 0.3
stealthchop_threshold: 0
#interpolate: true
diag_pin: micro:gpio13
driver_SGTHRS: 240

[autotune_tmc stepper_x]
motor: omc-17hs19-2004s1
tuning_goal: performance

[stepper_y]
step_pin: micro:gpio1
dir_pin: !micro:gpio0
enable_pin: !micro:gpio2
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 171
position_min: 0
position_max: 171
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: micro:gpio9
uart_address: 1
run_current: 0.8
hold_current: 0.3
stealthchop_threshold: 0
#interpolate: true
diag_pin: micro:gpio14
driver_SGTHRS: 250

[autotune_tmc stepper_y]
motor: omc-17hs19-2004s1
tuning_goal: performance

[stepper_z]
step_pin: micro:gpio26
dir_pin: !micro:gpio25
enable_pin: !micro:gpio27
microsteps: 32
rotation_distance: 8
position_min: -2
endstop_pin: probe:z_virtual_endstop
position_max: 173
homing_speed: 15
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin: micro:gpio9
uart_address: 2
run_current: 0.4
hold_current: 0.2
stealthchop_threshold: 999999
interpolate: true

[stepper_z1]
step_pin: micro:gpio23
dir_pin: micro:gpio22
enable_pin: !micro:gpio24
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z1]
uart_pin: micro:gpio9
uart_address: 3
run_current: 0.4
hold_current: 0.2
stealthchop_threshold: 999999
interpolate: true

[extruder]
step_pin: PB5
dir_pin: PB4
enable_pin: !PB8
microsteps: 32
#Uncomment for whichever version you have
#rotation_distance: 27.836 #red extruder
rotation_distance: 4.552 #titan extruder
nozzle_diameter: 0.400
filament_diameter: 1.750
#max_extrude_cross_section: 5
max_extrude_only_distance: 10000
max_extrude_only_velocity: 50
max_extrude_only_accel: 3000
instantaneous_corner_velocity: 1.500
heater_pin: micro:gpio20
sensor_type: Generic 3950
sensor_pin: micro:gpio29
smooth_time: 1 
pwm_cycle_time: 0.02
min_temp: 0
min_extrude_temp: 0
max_temp: 300
pressure_advance: 0.05#0.05
pressure_advance_smooth_time = 0.040
#pid_kp = 18.456
#pid_ki = 1.108
#pid_kd = 76.823

[tmc2208 extruder]
uart_pin: PC7
run_current: 0.6
hold_current: 0.3
stealthchop_threshold: 0

